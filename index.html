<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Viewer Gallery</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./style.css">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script type="module" src="./app.js"></script>
</head>
<body>
  <main class="container">
    <h1>3D Viewer</h1>
    <p class="hint">Klicke auf ein Bild, um das passende GLB zu laden.</p>

    <model-viewer
      id="viewer"
      src=""
      alt="3D-Modell"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral"
      ar
    ></model-viewer>

    <section class="panel">
      <h2>Vorschau</h2>
      <div id="gallery" class="gallery"></div>
    </section>

    <section class="panel">
      <h2>Upload (Bild + GLB)</h2>
      <div class="upload-layout">
        <form id="uploadForm" class="upload-form">
          <label>
            Bild (z. B. Joda.png)
            <input id="imageInput" type="file" accept="image/*" required>
          </label>
          <label>
            GLB (z. B. Joda.glb)
            <input id="glbInput" type="file" accept=".glb" required>
          </label>
          <button type="submit">Hochladen</button>
        </form>
        <div class="upload-preview">
          <p>Bildvorschau</p>
          <img id="imagePreview" alt="Vorschau">
        </div>
      </div>
      <p id="status" class="status"></p>
    </section>
  </main>
</body>
</html>
