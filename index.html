<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Viewer Gallery</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./style.css">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script type="module" src="./app.js"></script>
</head>
<body>
  <main class="container">
    <header class="topbar">
      <h1>3D Viewer</h1>
      <div class="top-actions">
        <button type="button" class="tile-btn" data-open="galleryPanel" aria-controls="galleryPanel">
          <span class="tile-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <rect x="3" y="4" width="8" height="7"></rect>
              <rect x="13" y="4" width="8" height="7"></rect>
              <rect x="3" y="13" width="8" height="7"></rect>
              <rect x="13" y="13" width="8" height="7"></rect>
            </svg>
          </span>
          <span>Vorschau</span>
        </button>
        <button type="button" class="tile-btn" data-open="uploadPanel" aria-controls="uploadPanel">
          <span class="tile-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <path d="M12 3l4 4h-3v7h-2V7H8z"></path>
              <rect x="4" y="16" width="16" height="4"></rect>
            </svg>
          </span>
          <span>Upload</span>
        </button>
      </div>
    </header>

    <model-viewer
      id="viewer"
      src=""
      alt="3D-Modell"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral"
      ar
    ></model-viewer>
  </main>

  <section id="galleryPanel" class="overlay" hidden>
    <div class="overlay-card">
      <div class="overlay-head">
        <h2>Vorschau</h2>
        <button type="button" class="close-btn" data-close>Schliessen</button>
      </div>
      <div id="gallery" class="gallery"></div>
    </div>
  </section>

  <section id="uploadPanel" class="overlay" hidden>
    <div class="overlay-card">
      <div class="overlay-head">
        <h2>Upload (Bild + GLB)</h2>
        <button type="button" class="close-btn" data-close>Schliessen</button>
      </div>
      <div class="upload-layout">
        <form id="uploadForm" class="upload-form">
          <label>
            Bild (z. B. Joda.png)
            <input id="imageInput" type="file" accept="image/*" required>
          </label>
          <label>
            GLB (z. B. Joda.glb)
            <input id="glbInput" type="file" accept=".glb" required>
          </label>
          <button type="submit">Hochladen</button>
        </form>
        <div class="upload-preview">
          <p>Bildvorschau</p>
          <img id="imagePreview" alt="Vorschau">
        </div>
      </div>
      <p id="status" class="status"></p>
    </div>
  </section>
</body>
</html>
